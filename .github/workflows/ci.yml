name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

      - name: test (race) + coverage
        run: go test -race -coverprofile=coverage.out -timeout 120s ./...

      - name: coverage gate (>= 90%)
        run: |
          # examples/ are runnable demos with no tests; they compile and
          # run under `go test ./...` above but are filtered out of the
          # gate so demo code does not dilute the production total.
          grep -v '/examples/' coverage.out > coverage.gate.out
          total=$(go tool cover -func=coverage.gate.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "total coverage (excluding examples): ${total}%"
          awk "BEGIN { exit !(${total} >= 90) }" || { echo "coverage ${total}% is below 90%"; exit 1; }

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
